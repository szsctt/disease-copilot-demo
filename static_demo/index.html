<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prioritise Diseases Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="navbar navbar-dark sticky-top bg-dark flex-md-nowrap p-0 shadow">
      <span class="navbar-brand col-md-3 col-lg-2 me-0 px-3">AI copilot for gene therapy prioritisation</span>
    </header>

    <div class="container-fluid">
      <div class="row">
        <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-body-tertiary sidebar collapse">
          <div class="position-sticky pt-3">
            <div class="px-3 mb-3">
              <label for="diseaseSelect" class="form-label fw-semibold">Disease</label>
              <select id="diseaseSelect" class="form-select"></select>
            </div>
            <div class="px-3 small text-body-secondary" id="diseaseMeta"></div>
          </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-3 border-bottom pb-2">
            <h1 class="h2 mb-0" id="pageTitle">Disease report</h1>
          </div>

          <section class="mb-4">
            <div class="row g-3" id="summaryCards"></div>
          </section>

          <section class="mb-5">
            <h2 class="h4">Criteria Scores</h2>
            <div class="table-responsive">
              <table class="table table-striped table-sm align-middle" id="scoresTable">
                <thead>
                  <tr>
                    <th>Criterion</th>
                    <th>Score</th>
                    <th>Confidence</th>
                    <th>Rationale</th>
                    <th>Citations</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </section>

          <section>
            <h2 class="h4">Citation Evidence</h2>
            <p class="text-body-secondary small">
              Numbered citations map directly to references in the criteria table.
            </p>
            <div id="citationsList" class="vstack gap-3"></div>
          </section>
        </main>
      </div>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
